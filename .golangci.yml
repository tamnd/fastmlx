# SPDX-License-Identifier: MIT OR Apache-2.0
version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
  settings:
    staticcheck:
      checks:
        - all
  exclusions:
    rules:
      # Test files intentionally ignore some response/error returns for brevity.
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose

formatters:
  enable:
    - gofmt
